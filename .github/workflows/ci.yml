name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

defaults:
  run:
    working-directory: tehillim-campaign-manager

jobs:
  quality:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax lint
        run: |
          find src tehillim-campaign-manager.php uninstall.php -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: PHPCS (coding standards)
        run: composer lint

      - name: PHPStan (static analysis)
        run: composer analyze

      - name: Unit tests
        run: composer test

  encoding:
    name: Encoding (no mojibake)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Check for replacement characters / mojibake
        run: |
          python3 - <<'PY'
          import os, sys
          # Replacement char + double-encoding (UTF-8-as-CP1252/CP1255) signatures.
          # These never occur in correct UTF-8 Hebrew/English content, so any hit
          # means real corruption (e.g. an em-dash mangled to "Ч’в‚¬"" or "Гўв‚¬").
          markers = [
              "пїЅ",
              "Ч’в‚¬", "Ч’вЂ ", "Ч’вЂљ",
              "Чів‚¬", "ЧівЂ ", "ЧівЂљ",
              "Гўв‚¬", "ГўвЂљВ¬",
              "ГѓвЂ”", "ГѓВ©", "ГѓВЁ", "Гѓ ", "ГѓВј", "ГѓвЂљ", "ГѓВў",
              "Г‚ ", "Г‚В©", "Г‚ВЈ",
              "Г—ВЄГ—", "Г–Вѕ", "ГЇВ»Вї",
          ]
          exts = (".php", ".js", ".css", ".po", ".pot", ".md", ".html", ".json")
          bad = []
          for root, _, files in os.walk("."):
              if any(p in root for p in (os.sep + ".git", "vendor", "node_modules")):
                  continue
              for fn in files:
                  if not fn.endswith(exts):
                      continue
                  path = os.path.join(root, fn)
                  try:
                      data = open(path, encoding="utf-8").read()
                  except Exception as e:
                      bad.append(f"{path}: unreadable as UTF-8 ({e})")
                      continue
                  for m in markers:
                      if m in data:
                          bad.append(f"{path}: contains {m!r} x{data.count(m)}")
          if bad:
              print("Mojibake / encoding issues found:")
              print("\n".join(bad))
              sys.exit(1)
          print("No mojibake found.")
          PY
